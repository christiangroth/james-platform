packageName: "de.chrgroth.james.api.restcrud"

model:
  - name: "App"
    endpoint: "apps/"
    attributes:
      - "id Long"
      - "name String"
      - "description String?"
  - name: "AppVersion"
    endpoint: "versions/"
    # TODO endpoint: "apps/{appId}/versions/"
    attributes:
      - "appId Long"
      - "version String" # maybe SemVer??
      - "models List<AppVersionModel>?"
      - "views List<AppVersionView>?"
  - name: "AppVersionModel"
    attributes:
      - "name String"
      - "jsonSchema String?"
  - name: "AppVersionView"
    attributes:
      - "name String"
      - "html String?"
