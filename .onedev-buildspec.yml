version: 0
jobs:
- name: build-and-test
  image: gradle:jdk11
  commands:
  - gradle build
  triggers:
  - !BranchUpdateTrigger {}
  retrieveSource: true
  cpuRequirement: 250m
  memoryRequirement: 128m
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600
  postBuildActions:
  - !CreateTagAction
    condition: successful
    tagName: version/@build_version@-@build_number@
