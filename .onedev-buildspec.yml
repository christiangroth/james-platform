version: 17
jobs:
- name: CI
  jobExecutor: onedev-ci-cd
  steps:
  - !CheckoutStep
    name: checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    withSubmodules: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !CommandStep
    name: command
    runInContainer: true
    image: gradle:jdk11
    interpreter: !DefaultInterpreter
      commands:
      - set -e
      - ''
      - echo "Detecting project version (may require some time while downloading gradle
        dependencies)..."
      - 'buildVersion=$(./gradlew properties | grep ^version: | grep -v unspecified
        | cut -c10-)'
      - echo "##onedev[SetBuildVersion '$buildVersion']"
      - echo
      - ''
      - echo "updating git config ..."
      - git config user.email "chr.groth@@gmx.de"
      - git config user.name "chris"
      - ''
      - echo "changing back from detached head to branch @branch@ ..."
      - git fetch origin @branch@:@branch@
      - git checkout @branch@
      - ''
      - ./gradlew --no-daemon --info build
      - ''
      - if [ "@branch@" = "main" ]; then
      - '  ./gradlew --no-daemon --info release -Prelease.useAutomaticVersion=true'
      - fi
    useTTY: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  triggers:
  - !BranchUpdateTrigger
    branches: main issue/**
    paths: -gradle.properties
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  cpuRequirement: 250
  memoryRequirement: 128
  caches:
  - key: gradle-cache
    path: /home/gradle/.gradle
  timeout: 3600
