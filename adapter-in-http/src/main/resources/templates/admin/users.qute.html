{#include base}
{#title}James Platform - User Management{/title}
{#scripts}
<script src="/js/admin/users.js"></script>
{/scripts}
{#homeLink}/ui/admin/dashboard{/homeLink}
<section class="contact-section bg-black" x-data="userTable()" x-init="fetchUsers()">
  <div class="container px-4 px-lg-5">
    <div class="card shadow mb-4">
      <div class="card-header py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 font-weight-bold text-primary">User Management</h6>
        <a href="#" class="btn btn-primary btn-sm">
          <i class="fas fa-plus me-1"></i> Add User
        </a>
      </div>
      <!-- Alert Notification -->
        <div x-show="alert.show" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform translate-y-2"
             x-transition:enter-end="opacity-100 transform translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="alert" 
             :class="{
               'alert-success': alert.type === 'success',
               'alert-danger': alert.type === 'danger'
             }">
          <div class="d-flex justify-content-between align-items-center">
            <span x-text="alert.message"></span>
            <button @click="alert.show = false" class="btn-close"></button>
          </div>
        </div>
        
        <!-- Loading State -->
        <div x-show="loading" class="text-center py-4">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-2">Loading users...</p>
        </div>
        
        <div x-show="!loading && !error" class="table-responsive">
          <table class="table table-bordered table-hover" width="100%" cellspacing="0">
            <thead class="table-dark">
              <tr>
                <th>Username</th>
                <th>Roles</th>
                <th>Password Status</th>
                <th>Status</th>
                <th>Failed Logins</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="user in users" :key="user.id">
                <tr>
                  <td x-text="user.username"></td>
                  <td x-text="user.roles.join(', ')"></td>
                  <td>
                    <span class="badge" :class="getPasswordStatusBadgeClass(user.passwordStatus)">
                      <span x-text="formatPasswordStatus(user.passwordStatus)"></span>
                    </span>
                  </td>
                  <td>
                    <span class="badge" :class="getStatusBadgeClass(user.status)">
                      <span x-text="formatStatus(user.status)"></span>
                    </span>
                    <template x-if="user.statusReason">
                      <div class="text-muted small" x-text="'(' + user.statusReason + ')'"></div>
                    </template>
                  </td>
                  <td x-text="user.deactivationCounter"></td>
                  <td>
                    <div class="dropdown">
                      <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-cog"></i>
                      </button>
                      <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#" @click.prevent="$event.stopPropagation(); confirmToggleStatus(user)">
                  <template x-if="user.status === 'ACTIVE'">
                    <span>Deactivate User</span>
                  </template>
                  <template x-if="user.status === 'INACTIVE'">
                    <span>Activate User</span>
                  </template>
                </a></li>
                <li><a class="dropdown-item" href="#">Reset Password</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#">Delete</a></li>
                      </ul>
                    </div>
                  </td>
                </tr>
              </template>
              <template x-if="!loading && !error && users.length === 0">
                <tr>
                  <td colspan="7" class="text-center">No users found</td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Status Change Modal -->
  <div x-show="showModal" 
       x-transition.opacity
       style="display: block;" 
       class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/50" @click="closeModal()"></div>
    <div class="relative z-10 w-full max-w-md bg-white rounded-lg shadow-xl">
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-medium text-gray-900" x-text="modalTitle"></h3>
          <button type="button" 
                  class="text-gray-400 hover:text-gray-500" 
                  @click="closeModal()">
            <span class="sr-only">Close</span>
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="mt-2">
          <p class="text-sm text-gray-500" x-text="modalMessage"></p>
          <div x-show="modalTitle === 'Deactivate User'" class="mt-4">
            <label for="deactivationReason" class="block text-sm font-medium text-gray-700">Reason (optional):</label>
            <input type="text" 
                   id="deactivationReason" 
                   class="block w-full mt-1 border-gray-300 rounded-md shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm"
                   x-model="modalInput.reason"
                   @keyup.enter="modalAction()"
                   placeholder="Enter reason for deactivation">
          </div>
        </div>
      </div>
      <div class="px-6 py-4 bg-gray-50 sm:flex sm:flex-row-reverse">
        <button type="button" 
                class="inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white bg-red-600 border border-transparent rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:ml-3 sm:w-auto sm:text-sm"
                @click="modalAction()">
          <span x-text="modalTitle"></span>
        </button>
        <button type="button" 
                class="inline-flex justify-center w-full px-4 py-2 mt-3 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm"
                @click="closeModal()">
          Cancel
        </button>
      </div>
    </div>
  </div>
</section>

<style>
  .alert {
    position: fixed;
    top: 1rem;
    right: 1rem;
    max-width: 24rem;
    z-index: 50;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    border-radius: 0.375rem;
    padding: 1rem;
    background-color: white;
    border-left: 4px solid;
  }
  
  .alert.alert-success {
    border-color: #10b981;
  }
  
  .alert.alert-danger {
    border-color: #ef4444;
  }
  
  .fade-enter-active, .fade-leave-active {
    transition: opacity 200ms;
  }
  .fade-enter-from, .fade-leave-to {
    opacity: 0;
  }
</style>

{/include}
