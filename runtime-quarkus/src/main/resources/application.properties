# static content
# https://quarkus.io/guides/http-reference#quarkus-vertx-http-config-group-static-resources-config_configuration
quarkus.http.static-resources.include-hidden=false
quarkus.http.static-resources.enable-range-support=false
quarkus.http.static-resources.caching-enabled=true
quarkus.http.static-resources.cache-entry-timeout=60m
quarkus.http.static-resources.max-age=24h

%dev.quarkus.http.static-resources.caching-enabled=false

# access log
# https://quarkus.io/guides/http-reference#configuring-http-access-logs
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=combined
quarkus.http.access-log.log-to-file=false
quarkus.http.access-log.category=io.quarkus.http.access-log
