# HEALTH CONFIGURATION MASKING
# -----------------------------
app.health.masked-config-keys=app.token-encryption-key,mongodb.connection.string,quarkus.mongodb.connection-string,app.slack.webhook-url,quarkus.tls.key-store.credentials-provider.alias-password-key,quarkus.tls.key-store.credentials-provider.password-key,slack.webhook.url
app.health.masked-env-keys=APP_TOKEN_ENCRYPTION_KEY,MONGODB_CONNECTION_STRING,SLACK_WEBHOOK_URL

# INTERNATIONALIZATION (i18n)
# -----------------------------
quarkus.default-locale=de
quarkus.locales=de,xx
