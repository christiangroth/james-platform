{#include layout.html}
    {#title}James Platform – {info.appName}{/title}
    {#content}
    <div class="container-fluid py-4 px-3 px-md-4">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb mb-0">
                {#breadcrumb-home homeUrl="/ui/user/dashboard" homeLabel="Dashboard" /}
                <li class="breadcrumb-item active" aria-current="page" style="color:var(--color-text-muted);" data-testid="app-name">{info.appName}</li>
            </ol>
        </nav>
        <div class="card app-card p-4" data-testid="app-detail-placeholder">
            <p class="mb-0 app-section-label">App content will appear here.</p>
        </div>
    </div>
    {/content}
{/include}
