{#include layout.html}
    {#title}James Platform – {info.appName}{/title}
    {#content}
    <div class="container-fluid py-4 px-3 px-md-4">
        <div class="d-flex align-items-center mb-4 gap-3">
            <a href="/ui/user/dashboard" class="btn btn-app-secondary btn-sm" data-testid="back-link">← Dashboard</a>
            <h1 class="fs-4 fw-semibold mb-0" data-testid="app-name">{info.appName}</h1>
        </div>
        <div class="card app-card p-4" data-testid="app-detail-placeholder">
            <p class="mb-0 app-section-label">App content will appear here.</p>
        </div>
    </div>
    {/content}
{/include}
