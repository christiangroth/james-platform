{#include layout.html}
    {#title}James Platform – Admin Dashboard{/title}
    {#content}
    <div class="container-fluid py-4 px-3 px-md-4">
        <div class="row g-3">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <a href="/ui/admin/users" class="text-decoration-none" data-testid="user-count-tile">
                    <div class="card app-card p-3 h-100 d-flex flex-column align-items-center justify-content-center text-center" style="cursor:pointer;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#e0e0e0" viewBox="0 0 16 16" class="mb-2" aria-hidden="true"><use href="#icon-nav-profile"/></svg>
                        <div class="fw-semibold fs-5" data-testid="user-count">{userCount.formatted}</div>
                        <div class="app-section-label mt-1">Users</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
    {/content}
{/include}
