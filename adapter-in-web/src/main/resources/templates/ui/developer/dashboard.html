{#include layout.html}
    {#title}James Platform – Developer Dashboard{/title}
    {#content}
    <div class="container-fluid py-4 px-3 px-md-4">
        <h1 class="mb-4 fs-4 fw-semibold" data-testid="welcome-message">Hello, {username}!</h1>

        {#if errorMessage}
        <div class="alert alert-danger alert-dismissible mb-4" role="alert" data-testid="error-message">
            {errorMessage}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {/if}

        <div class="row g-3" data-testid="apps-grid">
            <!-- New App tile (always first) -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card app-card p-3 h-100 d-flex flex-column align-items-center justify-content-center text-center"
                     style="cursor:pointer; border-style:dashed !important;"
                     data-bs-toggle="modal" data-bs-target="#createAppModal"
                     data-testid="new-app-tile"
                     role="button"
                     aria-label="Create a new app">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#888" viewBox="0 0 16 16" class="mb-2" aria-hidden="true">
                        <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
                    </svg>
                    <div class="fw-semibold fs-6">New App</div>
                </div>
            </div>

            <!-- Existing app tiles -->
            {#for app in apps}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <a href="/ui/developer/apps/{app.id}" class="text-decoration-none" data-testid="app-tile" aria-label="Open app {app.name}">
                    <div class="card app-card p-3 h-100 d-flex flex-column" style="cursor:pointer;">
                        <div class="fw-semibold fs-6 mb-1" data-testid="app-name">{app.name}</div>
                        {#if app.description}
                        <div class="app-section-label text-truncate mb-2" data-testid="app-description">{app.description}</div>
                        {/if}
                        <div class="mt-auto">
                            <span class="badge app-badge-muted" data-testid="app-status">{app.status}</span>
                        </div>
                    </div>
                </a>
            </div>
            {/for}
        </div>
    </div>

    <!-- Create App Modal -->
    <div class="modal fade" id="createAppModal" tabindex="-1" aria-labelledby="createAppModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="background-color:#1e1e1e;border-color:#333;color:#e0e0e0;">
                <div class="modal-header" style="border-color:#333;">
                    <h5 class="modal-title" id="createAppModalLabel">New App</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" action="/ui/developer/apps">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="newAppName" class="form-label">Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control app-form-control" id="newAppName" name="name" required autocomplete="off" data-testid="create-app-name-input">
                        </div>
                        <div class="mb-3">
                            <label for="newAppDescription" class="form-label">Description</label>
                            <textarea class="form-control app-form-control" id="newAppDescription" name="description" rows="3" autocomplete="off" data-testid="create-app-description-input"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer" style="border-color:#333;">
                        <button type="button" class="btn btn-app-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-app-primary" data-testid="create-app-submit-button">Create App</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    {/content}
{/include}
