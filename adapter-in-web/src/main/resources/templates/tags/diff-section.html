<div class="card app-card mb-3" data-testid="{sectionTestId}-diff-section">
    <div class="card-header d-flex align-items-center gap-2" style="background-color:#1a1a1a;border-color:var(--color-border);">
        <span class="fw-semibold" data-testid="{sectionTestId}-diff-name">{section.name}</span>
        {#if section.status.name == 'ADDED'}
        <span class="badge ms-auto" style="background-color:#1a4a1a;color:#4ade80;border:1px solid #166534;" data-testid="{sectionTestId}-diff-status">Added</span>
        {#else if section.status.name == 'REMOVED'}
        <span class="badge ms-auto" style="background-color:#4a1a1a;color:#f87171;border:1px solid #991b1b;" data-testid="{sectionTestId}-diff-status">Removed</span>
        {#else}
        <span class="badge ms-auto" style="background-color:#1a2a4a;color:#60a5fa;border:1px solid #1d4ed8;" data-testid="{sectionTestId}-diff-status">Modified</span>
        {/if}
    </div>
    <div class="card-body p-0">
        <pre style="margin:0;padding:0.75rem;font-size:0.8rem;font-family:monospace;background-color:#111;overflow-x:auto;" data-testid="{sectionTestId}-diff-lines">{#for line in section.lines}
{#if line.status.name == 'ADDED'}<span style="display:block;background-color:#0d2f0d;color:#4ade80;" data-testid="diff-line-added">+ {line.text}</span>{#else if line.status.name == 'REMOVED'}<span style="display:block;background-color:#2f0d0d;color:#f87171;" data-testid="diff-line-removed">- {line.text}</span>{#else}<span style="display:block;color:var(--color-text-muted);" data-testid="diff-line-unchanged">  {line.text}</span>{/if}{/for}</pre>
    </div>
</div>
