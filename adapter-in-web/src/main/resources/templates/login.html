{#include layout.html}
    {#leftNavLinks}{/leftNavLinks}
    {#appVersion}<span class="app-version me-auto">{appBuildVersion}</span>{/appVersion}
    {#navLinks}{/navLinks}
    {#navbarSse}{/navbarSse}
    {#content}
    <div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 52px);">
        <div style="max-width: 360px; width: 100%;">
            {#if errorMessage}
            <div class="alert alert-danger mb-4 text-start" role="alert">{errorMessage}</div>
            {/if}
            <div class="card app-card p-4">
                <h1 class="fs-5 fw-semibold text-center mb-4">James Platform</h1>
                <form method="post" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control bg-transparent text-white border-secondary" id="username" name="username" autocomplete="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control bg-transparent text-white border-secondary" id="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-spotify w-100" data-testid="login-button">Log in</button>
                </form>
            </div>
        </div>
    </div>
    {/content}
{/include}
