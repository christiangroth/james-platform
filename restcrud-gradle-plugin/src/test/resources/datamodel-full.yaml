packageName: "de.chrgroth.james.api.restcrud"

datamodel:
  - name: "app"
    key: ["id"]
    endpoint: "apps/"
    attributes:
      - "id Long"
      - "name String"
      - "description String?"
  - name: "appVersion"
    key: ["appId", "version"]
    endpoint: "apps/{appId}/versions/"
    attributes:
      - "appId Long"
      - "version String" # maybe SemVer??
      - "models List<AppVersionModel>?"
      - "views List<AppVersionView>?"
  - name: "appVersionModel"
    key: ["name"]
    attributes:
      - "name String"
      - "jsonSchema String?"
  - name: "appVersionView"
    key: ["name"]
    attributes:
      - "name String"
      - "html String?"
