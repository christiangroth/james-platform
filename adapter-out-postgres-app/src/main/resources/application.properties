#---- DATASOURCE
quarkus.datasource.app.db-kind=postgresql
quarkus.datasource.app.password=jamesplatform
quarkus.datasource.app.username=jamesplatform

quarkus.datasource.app.metrics.enabled=true

quarkus.datasource.app.devservices.enabled=true
quarkus.datasource.app.devservices.show-logs=true
quarkus.datasource.app.devservices.reuse=false

%prod.quarkus.datasource.app.jdbc.url=${DB_POSTGRES_URL}
%prod.quarkus.datasource.app.username=${DB_POSTGRES_USERNAME}
%prod.quarkus.datasource.app.password=${DB_POSTGRES_PASSWORD}

#---- HIBERNATE
quarkus.hibernate-orm.app.persistence-unit=app
quarkus.hibernate-orm.app.datasource=app
quarkus.hibernate-orm.app.metrics.enabled=true
quarkus.hibernate-orm.app.packages=de.chrgroth.james.platform.adapter.out.postgres.app

#---- FLYWAY
quarkus.flyway.app.locations=classpath:db/migration/app
quarkus.flyway.app.schemas=app_domain
quarkus.flyway.app.migrate-at-start=true
quarkus.flyway.app.validate-on-migrate=true
