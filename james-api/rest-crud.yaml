configuration:
  codeGenerationPackage: "de.chrgroth.james.api"
  restBasePath: "/api/"
rest:
  app: "apps/"
  appVersion: "apps/{appId}/versions/"
datamodel:
  app:
    key: ["id"]
    attributes:
      id: "Long"
      name: "String"
      description: "String?"
  appVersion:
    key: ["appId", "version"]
    attributes:
      appId: "Long"
      version: "String" # maybe SemVer??
      models: "List<ref:appVersionModel>?"
      views: "List<ref:appVersionView>?"
  appVersionModel:
    attributes:
      name: "String"
      jsonSchema: "String"
  appVersionView:
    attributes:
      name: "String"
      html: "String"