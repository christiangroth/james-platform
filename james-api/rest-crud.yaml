configuration:
  codeGenerationPackage: "de.chrgroth.james.api.restcrud"
  restBasePath: "/api/"

rest:
  app: "apps/"
  appVersion: "apps/{appId}/versions/"

datamodel:
  app:
    key: ["id"]
    attributes:
      id: "Long"
      name: "String"
      description: "String?"
  appVersion:
    key: ["appId", "version"]
    attributes:
      appId: "Long"
      version: "String" # maybe SemVer??
      models: "List<AppVersionModel>?"
      views: "List<AppVersionView>?"
  # TODO embedded only, do not generate persistence operations!
  appVersionModel:
    attributes:
      name: "String"
      jsonSchema: "String"
  appVersionView:
    attributes:
      name: "String"
      html: "String"