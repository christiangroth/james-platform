# TODO reduce to default DS only and adapt Flyway Config
#---- DATASOURCE#---- DATASOURCE
quarkus.datasource.db-kind=postgresql
quarkus.datasource.password=jamesplatform
quarkus.datasource.username=jamesplatform

quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.show-logs=true
quarkus.datasource.devservices.reuse=false

%prod.quarkus.datasource.jdbc.url=${DB_POSTGRES_URL}
%prod.quarkus.datasource.username=${DB_POSTGRES_USERNAME}
%prod.quarkus.datasource.password=${DB_POSTGRES_PASSWORD}

#---- FLYWAY
quarkus.flyway.locations=classpath:db/migration/user
quarkus.flyway.schemas=user_domain
quarkus.flyway.migrate-at-start=true
quarkus.flyway.validate-on-migrate=true
