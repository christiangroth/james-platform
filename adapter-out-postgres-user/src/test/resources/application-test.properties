# Test configuration for H2 in-memory database
%test.quarkus.datasource.users.db-kind=h2
%test.quarkus.datasource.users.jdbc.url=jdbc:h2:mem:users_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.datasource.users.username=sa
%test.quarkus.datasource.users.password=password

# Disable Flyway in tests (we'll use H2's native schema creation)
%test.quarkus.flyway.migrate-at-start=false

# Configure jOOQ for H2 in tests
%test.quarkus.jooq.sql-dialect=H2
%test.quarkus.jooq.dialect=H2

# Reduce logging verbosity in tests
%test.quarkus.log.category."org.jooq".level=WARN
%test.quarkus.log.category."org.flywaydb".level=WARN
