# SLACK SYSTEM NOTIFICATIONS
# --------------------------
# Slack incoming webhook URL – must be configured for notifications to be sent.
# Leave blank to disable sending; set via environment variable in production.
app.slack.webhook-url=
%prod.app.slack.webhook-url=${SLACK_WEBHOOK_URL:}

# Slack message appearance
app.slack.username=James Platform
app.slack.icon-emoji=:robot_face:

# Individual toggles for system event notifications (all enabled by default)
app.slack.system-notifications.startup=true
app.slack.system-notifications.stopping=true
