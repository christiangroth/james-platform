name: Java CI/CD with Gradle

on: push

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v3
    - run: ./gradlew build
    - run: ./gradlew release
      if: github.ref == 'refs/heads/main'
