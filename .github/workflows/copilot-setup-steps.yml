name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Download dependencies
        # GHCR_PAT is required to resolve private packages from GitHub Package Registry
        # (maven.pkg.github.com) used as Maven repositories in settings.gradle.kts
        run: ./gradlew dependencies
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
