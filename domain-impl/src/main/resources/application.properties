# TOKEN ENCRYPTION
# ----------------
# Required in production: base64-encoded 32-byte AES-256 key
# Generate ONCE with: openssl rand -base64 32
# IMPORTANT: Never change this key in production — doing so invalidates all existing session cookies.
%prod.app.token-encryption-key=${APP_TOKEN_ENCRYPTION_KEY}
# 32 bytes: 0x00..0x1F
%dev.app.token-encryption-key=AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
%test.app.token-encryption-key=AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=

# SCRIPTING
# ---------
# Maximum execution time (ms) per individual Kotlin script evaluation (smart defaults and computed properties).
app.script.timeout-ms=500
