# DEV SERVICES
# ------------
quarkus.devservices.enabled=true
quarkus.datasource.devservices.show-logs=false

# HEALTH
# ------
%dev.quarkus.smallrye-health.ui.enabled=true
%dev.quarkus.smallrye-health.include-problem-details=true

# TESTING
# -------
quarkus.test.integration-test-profile=test

# DOCKER
# ------
quarkus.container-image.builder=docker
# enabled for gradle release task explicitly
quarkus.container-image.build=false
quarkus.container-image.push=false
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=christiangroth/james-platform
quarkus.container-image.name=quarkus
