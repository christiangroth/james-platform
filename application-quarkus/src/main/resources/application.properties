# DEV SERVICES
# ------------
%dev.quarkus.devservices.enabled=true

# SECURITY
# --------
# Ensure authentication is always performed (even for @PermitAll endpoints), so valid sessions
# are detected on the login page and users are redirected to the dashboard.
quarkus.http.auth.proactive=true
# HEALTH
# ------
%dev.quarkus.smallrye-health.include-problem-details=true

# ERROR
# -----
%dev.app.error.show-details=true
%test.app.error.show-details=true

# TESTING
# -------
quarkus.test.integration-test-profile=test
# Use fixed port 8081 so test profile config can reference it
quarkus.http.test-port=8081
# Use a generous script timeout in tests to accommodate Kotlin compiler cold-start overhead
%test.app.script.timeout-ms=30000

# DOCKER
# ------
quarkus.container-image.builder=docker
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=christiangroth/james-platform
quarkus.container-image.name=quarkus

# LOGGING
# -------
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false

# MONGODB
# -------
quarkus.mongodb.application-name=james-platform
quarkus.mongodb.database=james-platform
%prod.quarkus.mongodb.connection-string=${MONGODB_CONNECTION_STRING}
# Enable MongoDB pool metrics for all profiles (prod, dev, test) to include mongodb metrics group in metrics endpoint
quarkus.mongodb.metrics.enabled=true
